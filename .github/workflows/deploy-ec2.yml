name: Deploy Backend To EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Validate syntax
        run: python -m compileall app

  deploy:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs: test
    environment: production
    env:
      EC2_HOST: ${{ vars.EC2_HOST }}
      EC2_USER: ${{ vars.EC2_USER }}
      EC2_PORT: ${{ vars.EC2_PORT }}
      EC2_APP_DIR: ${{ vars.EC2_APP_DIR }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          PORT="${EC2_PORT:-22}"
          ssh-keyscan -p "${PORT}" "${EC2_HOST}" >> ~/.ssh/known_hosts

      - name: Sync source to EC2
        run: |
          PORT="${EC2_PORT:-22}"
          rsync -az --delete \
            --exclude ".git" \
            --exclude ".github" \
            --exclude ".venv" \
            --exclude "__pycache__" \
            --exclude ".env" \
            -e "ssh -p ${PORT} -i ~/.ssh/id_ed25519" \
            ./ "${EC2_USER}@${EC2_HOST}:${EC2_APP_DIR}"

      - name: Upload runtime secrets to EC2
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PUBLIC_URL: ${{ vars.PUBLIC_URL }}
        run: |
          set -euo pipefail
          if [ -z "${OPENAI_API_KEY}" ]; then
            echo "OPENAI_API_KEY GitHub secret is missing." >&2
            exit 1
          fi
          if [ -z "${PUBLIC_URL}" ]; then
            echo "PUBLIC_URL GitHub variable is missing." >&2
            exit 1
          fi

          PORT="${EC2_PORT:-22}"
          printf '%s\n%s\n' "${OPENAI_API_KEY}" "${PUBLIC_URL}" | ssh -p "${PORT}" -i ~/.ssh/id_ed25519 \
            "${EC2_USER}@${EC2_HOST}" \
            "set -euo pipefail; cd \"${EC2_APP_DIR}\"; IFS= read -r key; IFS= read -r public_url; tmp=\$(mktemp); if [ -f .env ]; then grep -v -E '^(OPENAI_API_KEY|PUBLIC_URL)=' .env > \"\$tmp\" || true; else : > \"\$tmp\"; fi; if [ -s \"\$tmp\" ]; then printf '\n' >> \"\$tmp\"; fi; printf '# Runtime\nPUBLIC_URL=%s\n\n# OpenAI\nOPENAI_API_KEY=%s\n' \"\$public_url\" \"\$key\" >> \"\$tmp\"; mv \"\$tmp\" .env; chmod 600 .env"

      - name: Install deps and restart service
        run: |
          PORT="${EC2_PORT:-22}"
          ssh -p "${PORT}" -i ~/.ssh/id_ed25519 \
            "${EC2_USER}@${EC2_HOST}" << EOF
          set -euo pipefail
          cd "${EC2_APP_DIR}"

          if [ ! -f .env ]; then
            echo ".env is missing on server. Create it first." >&2
            exit 1
          fi

          python3 -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt

          sudo systemctl daemon-reload
          sudo systemctl restart habla-core
          sudo systemctl is-active --quiet habla-core

          healthy=0
          for i in \$(seq 1 30); do
            if curl -fsS http://127.0.0.1:8000/ >/dev/null 2>&1; then
              healthy=1
              break
            fi
            sleep 1
          done

          if [ "\${healthy}" -eq 1 ]; then
            echo "Health check passed."
          else
            echo "Health check failed after 30s. Service diagnostics:"
            sudo systemctl status habla-core --no-pager -l || true
            sudo journalctl -u habla-core -n 120 --no-pager || true
            exit 1
          fi
          EOF
